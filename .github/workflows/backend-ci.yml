name: Backend CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./UrbanMove-Backend

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js 18.x
      uses: actions/setup-node@v4
      with:
        node-version: 18.x
        cache: 'npm'
        cache-dependency-path: './UrbanMove-Backend/package-lock.json'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run Jest test suite
      run: npm test
      env:
        NODE_ENV: test
